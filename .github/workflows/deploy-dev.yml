# .github/workflows/deploy-dev.yml
name: CI/CD (Build & Swarm Deploy)

on:
  push:
    branches: [ develop ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract version
        id: meta
        run: |
          VERSION=$(jq -r .version ./package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file:    ./Dockerfile
          push:    true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to server & Swarm update
        uses: appleboy/ssh-action@v0.1.5
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            VERSION=${{ needs.build-and-push.outputs.version }}
            docker pull ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:$VERSION
            docker service update \
              --image ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:$VERSION \
              kkobak_kkobak-frontend
              
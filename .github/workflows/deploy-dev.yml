# .github/workflows/deploy-dev.yml
name: CI/CD (Build & Swarm Deploy)

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v3
        with:
          context: ./kkobak/kkobak_frontend
          file:    ./kkobak/kkobak_frontend/Dockerfile
          push:    true
          tags:    |
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:${{ github.sha }}

  deploy:
    name: SSH & Swarm Deploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH to server and update service
        uses: appleboy/ssh-action@v0.1.5
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest
            docker service update \
              --image ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest \
              kkobak_kkobak-frontend

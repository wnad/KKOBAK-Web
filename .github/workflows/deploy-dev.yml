# .github/workflows/deploy-dev.yml
name: CI/CD (Build & Swarm Deploy)

on:
  push:
    branches: [ develop ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract version
        id: meta
        run: |
          VERSION=$(jq -r .version ./package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file:    ./Dockerfile
          push:    true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH & Swarm update
        uses: appleboy/ssh-action@v0.1.5
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1) 올바른 version 가져오기 (비어 있으면 latest로 변경)
            VERSION=${{ needs.build-and-push.outputs.version }}
            if [ -z "$VERSION" ]; then
              echo "⚠️ VERSION is empty, falling back to 'latest'"
              VERSION=latest
            fi
            echo "🔖 Deploying version: $VERSION"

            # 2) pull & update
            IMAGE=${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:$VERSION
            docker pull $IMAGE

            # 3) 서비스 이름 확인
            SERVICE_NAME=kkobak_kkobak-frontend  # ← 실제 `docker service ls` 결과에 맞춰 변경

            # 4) 무중단 롤링 업데이트
            docker service update \
              --image $IMAGE \
              $SERVICE_NAME

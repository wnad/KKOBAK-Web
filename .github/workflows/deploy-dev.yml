# .github/workflows/deploy-dev.yml
name: Deploy to Dev (Swarm)

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies & build
        working-directory: ./kkobak/kkobak_frontend
        run: |
          npm ci
          npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v3
        with:
          context: kkobak_frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest
            ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:${{ github.sha }}

  deploy:
    name: SSH & Swarm Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH to server & update service
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull the new image
            docker pull ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest

            # Trigger Swarm rolling update
            docker service update \
              --image ${{ secrets.DOCKERHUB_USER }}/kkobak-frontend:latest \
              kkobak_kkobak-frontend

